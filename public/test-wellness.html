<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Wellness API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .data { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Wellness API Test</h1>
    
    <div class="section">
        <h2>Medications</h2>
        <button onclick="loadMedications()">Load Medications</button>
        <div id="medications-data" class="data"></div>
    </div>
    
    <div class="section">
        <h2>Conditions</h2>
        <button onclick="loadConditions()">Load Conditions</button>
        <div id="conditions-data" class="data"></div>
    </div>
    
    <div class="section">
        <h2>Allergies</h2>
        <button onclick="loadAllergies()">Load Allergies</button>
        <div id="allergies-data" class="data"></div>
    </div>
    
    <div class="section">
        <h2>Insurance</h2>
        <button onclick="loadInsurance()">Load Insurance</button>
        <div id="insurance-data" class="data"></div>
    </div>

    <script>
        const API_BASE = '/api/user';
        const TOKEN = 'test-token';
        
        async function loadMedications() {
            try {
                const response = await fetch(`${API_BASE}/medications`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await response.json();
                document.getElementById('medications-data').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('medications-data').innerHTML = 
                    `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }
        
        async function loadConditions() {
            try {
                const response = await fetch(`${API_BASE}/conditions`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await response.json();
                document.getElementById('conditions-data').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('conditions-data').innerHTML = 
                    `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }
        
        async function loadAllergies() {
            try {
                const response = await fetch(`${API_BASE}/allergies`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await response.json();
                document.getElementById('allergies-data').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('allergies-data').innerHTML = 
                    `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }
        
        async function loadInsurance() {
            try {
                const response = await fetch(`${API_BASE}/insurance`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await response.json();
                document.getElementById('insurance-data').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('insurance-data').innerHTML = 
                    `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }
        
        // Load all data on page load
        window.addEventListener('load', () => {
            loadMedications();
            loadConditions();
            loadAllergies();
            loadInsurance();
        });
    </script>
</body>
</html>
