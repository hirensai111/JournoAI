<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - JournoAI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">JA</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-description">Sign in to continue your journey</p>
      </div>

      <div id="alert-container"></div>

      <form id="signin-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            minlength="6"
          />
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="/reset-password.html" style="font-size: 0.875rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="signin-btn">
          <span id="signin-text">Sign in</span>
          <span id="signin-spinner" class="spinner hidden"></span>
        </button>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button type="button" class="btn btn-outline btn-lg" style="width: 100%;" id="google-signin-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <!-- Auth Configuration -->
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth-service.js"></script>

  <script>
    const form = document.getElementById('signin-form');
    const signinBtn = document.getElementById('signin-btn');
    const signinText = document.getElementById('signin-text');
    const signinSpinner = document.getElementById('signin-spinner');
    const googleSigninBtn = document.getElementById('google-signin-btn');
    const alertContainer = document.getElementById('alert-container');

    function showAlert(message, type = 'error') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          ${message}
        </div>
      `;
    }

    function clearAlert() {
      alertContainer.innerHTML = '';
    }

    function setLoading(isLoading) {
      if (isLoading) {
        signinBtn.disabled = true;
        googleSigninBtn.disabled = true;
        signinText.classList.add('hidden');
        signinSpinner.classList.remove('hidden');
      } else {
        signinBtn.disabled = false;
        googleSigninBtn.disabled = false;
        signinText.classList.remove('hidden');
        signinSpinner.classList.add('hidden');
      }
    }

    // Sign in with email/password
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields');
        return;
      }

      setLoading(true);

      try {
        const result = await window.authService.signIn(email, password);

        if (result.success) {
          showAlert('Sign in successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showAlert(result.error);
          setLoading(false);
        }
      } catch (error) {
        showAlert('An unexpected error occurred. Please try again.');
        setLoading(false);
      }
    });

    // Sign in with Google
    googleSigninBtn.addEventListener('click', async () => {
      clearAlert();
      googleSigninBtn.disabled = true;
      googleSigninBtn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const result = await window.authService.signInWithGoogle();

        if (result.success) {
          showAlert('Google sign in successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showAlert(result.error);
          googleSigninBtn.disabled = false;
          googleSigninBtn.innerHTML = 'Continue with Google';
        }
      } catch (error) {
        showAlert('An unexpected error occurred. Please try again.');
        googleSigninBtn.disabled = false;
        googleSigninBtn.innerHTML = 'Continue with Google';
      }
    });

    // Check if already signed in
    window.firebaseAuth.onAuthStateChanged((user) => {
      if (user) {
        // User is already signed in, redirect to dashboard
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
