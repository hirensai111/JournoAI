<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Journey AI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">JA</div>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-description">Start planning your accessible journey</p>
      </div>

      <div id="alert-container"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input
            type="text"
            id="name"
            class="form-input"
            placeholder="Sarah Mitchell"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="At least 6 characters"
            required
            autocomplete="new-password"
            minlength="6"
          />
          <div id="password-strength" class="form-error hidden"></div>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            class="form-input"
            placeholder="Re-enter your password"
            required
            autocomplete="new-password"
            minlength="6"
          />
        </div>

        <div style="margin-bottom: 1.5rem;">
          <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
            <input type="checkbox" id="terms" required style="margin-top: 0.25rem;" />
            <span>
              I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and
              <a href="/privacy.html" target="_blank">Privacy Policy</a>
            </span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="signup-btn">
          <span id="signup-text">Create account</span>
          <span id="signup-spinner" class="spinner hidden"></span>
        </button>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button type="button" class="btn btn-outline btn-lg" style="width: 100%;" id="google-signup-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/signin.html">Sign in</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <!-- Auth Configuration -->
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth-service.js"></script>

  <script>
    const form = document.getElementById('signup-form');
    const signupBtn = document.getElementById('signup-btn');
    const signupText = document.getElementById('signup-text');
    const signupSpinner = document.getElementById('signup-spinner');
    const googleSignupBtn = document.getElementById('google-signup-btn');
    const alertContainer = document.getElementById('alert-container');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const passwordStrength = document.getElementById('password-strength');

    function showAlert(message, type = 'error') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          ${message}
        </div>
      `;
    }

    function clearAlert() {
      alertContainer.innerHTML = '';
    }

    function setLoading(isLoading) {
      if (isLoading) {
        signupBtn.disabled = true;
        googleSignupBtn.disabled = true;
        signupText.classList.add('hidden');
        signupSpinner.classList.remove('hidden');
      } else {
        signupBtn.disabled = false;
        googleSignupBtn.disabled = false;
        signupText.classList.remove('hidden');
        signupSpinner.classList.add('hidden');
      }
    }

    // Password strength checker
    passwordInput.addEventListener('input', (e) => {
      const password = e.target.value;

      if (password.length === 0) {
        passwordStrength.classList.add('hidden');
        return;
      }

      if (password.length < 6) {
        passwordStrength.textContent = 'Password must be at least 6 characters';
        passwordStrength.classList.remove('hidden');
      } else if (password.length < 8) {
        passwordStrength.textContent = 'Weak password. Consider adding more characters';
        passwordStrength.classList.remove('hidden');
      } else {
        passwordStrength.classList.add('hidden');
      }
    });

    // Sign up with email/password
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const terms = document.getElementById('terms').checked;

      // Validation
      if (!name || !email || !password || !confirmPassword) {
        showAlert('Please fill in all fields');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters long');
        return;
      }

      if (!terms) {
        showAlert('Please accept the Terms of Service and Privacy Policy');
        return;
      }

      setLoading(true);

      try {
        const result = await window.authService.signUp(email, password, name);

        if (result.success) {
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/onboarding.html';
          }, 1500);
        } else {
          showAlert(result.error);
          setLoading(false);
        }
      } catch (error) {
        showAlert('An unexpected error occurred. Please try again.');
        setLoading(false);
      }
    });

    // Sign up with Google
    googleSignupBtn.addEventListener('click', async () => {
      clearAlert();
      googleSignupBtn.disabled = true;
      googleSignupBtn.innerHTML = '<span class="spinner"></span> Signing up...';

      try {
        const result = await window.authService.signInWithGoogle();

        if (result.success) {
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/onboarding.html';
          }, 1500);
        } else {
          showAlert(result.error);
          googleSignupBtn.disabled = false;
          googleSignupBtn.innerHTML = 'Continue with Google';
        }
      } catch (error) {
        showAlert('An unexpected error occurred. Please try again.');
        googleSignupBtn.disabled = false;
        googleSignupBtn.innerHTML = 'Continue with Google';
      }
    });

    // Check if already signed in
    window.firebaseAuth.onAuthStateChanged((user) => {
      if (user) {
        // User is already signed in, redirect to dashboard
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
